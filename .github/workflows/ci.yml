name: wrongcl-ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libayatana-appindicator3-dev musl-tools protobuf-compiler

      - name: Verify Linux workflow
        run: bash scripts/verify-local.sh linux

      - name: Package Linux release bundle
        run: bash scripts/package-linux-release.sh

      - name: Package Linux headless release bundle
        run: bash scripts/package-headless-linux-release.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wrongcl-linux-x64
          path: |
            dist/*.tar.gz
            dist/*.sha256

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          # ubuntu-latest ships with ~14GB free; Rust × multiple Android ABIs
          # + Flutter SDK + Android SDK/NDK + Gradle blow past that and the
          # build dies mid-link with `No space left on device`. Remove the
          # bundled toolchains we never use (~12GB freed) to give the build
          # headroom. Keep /usr/local/lib/android — cargo-ndk needs it.
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Android build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config protobuf-compiler
          cargo install cargo-ndk --locked

      - name: Verify Android workflow
        run: bash scripts/verify-android-host.sh

      - name: Package Android release bundle
        run: bash scripts/package-android-release.sh

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wrongcl-android
          path: |
            dist/*.apk
            dist/*.sha256

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install Windows build dependencies
        run: choco install protoc --yes

      - name: Verify Windows workflow
        run: powershell -ExecutionPolicy Bypass -File scripts/verify-windows-host.ps1

      - name: Package Windows release bundle
        run: powershell -ExecutionPolicy Bypass -File scripts/package-windows-release.ps1

      - name: Package Windows MSIX installer
        run: powershell -ExecutionPolicy Bypass -File scripts/package-windows-msix.ps1

      - name: Package Windows headless release bundle
        run: powershell -ExecutionPolicy Bypass -File scripts/package-headless-windows-release.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wrongcl-windows-x64
          path: |
            dist/*.zip
            dist/*.msix
            dist/*.sha256

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install macOS build dependencies
        run: brew install protobuf

      - name: Verify macOS workflow
        run: bash scripts/verify-macos-host.sh

      - name: Package macOS release bundle
        run: bash scripts/package-macos-release.sh

      - name: Package macOS headless release bundle
        run: bash scripts/package-headless-macos-release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wrongcl-macos-universal
          path: |
            dist/*.zip
            dist/*.sha256

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install iOS build dependencies
        run: brew install protobuf

      - name: Verify iOS workflow
        run: bash scripts/verify-ios-host.sh

      - name: Package iOS release bundle
        run: bash scripts/package-ios-release.sh

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wrongcl-ios-arm64
          path: |
            dist/*.zip
            dist/*.sha256
